apiVersion: apps/v1
kind: Deployment
metadata:
  name: settings-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: settings-service
  template:
    metadata:
      labels:
        app: settings-service
    spec:
      containers:
      - name: settings-service
        image: settings-service
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: microservices_db
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: settings-service
spec:
  selector:
    app: settings-service
  ports:
    - port: 3003
      targetPort: 3003
