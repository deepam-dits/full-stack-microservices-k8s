services:
  postgres:
    image: postgres:16-alpine
    container_name: micro-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-microservices_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-microservices_db}"]
      interval: 5s
      timeout: 3s
      retries: 20

  user-service:
    build:
      context: ./backend-node-app
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-microservices_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    ports:
      - "${USER_SERVICE_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard-service:
    build:
      context: ./backend-node-app
      dockerfile: dashboard-service/Dockerfile
    container_name: dashboard-service
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-microservices_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    ports:
      - "${DASHBOARD_SERVICE_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy

  settings-service:
    build:
      context: ./backend-node-app
      dockerfile: settings-service/Dockerfile
    container_name: settings-service
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-microservices_db}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    ports:
      - "${SETTINGS_SERVICE_PORT:-3003}:3003"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-react-app
      args:
        USER_SERVICE_URL: ${USER_SERVICE_URL:-http://localhost:3001}
        DASHBOARD_SERVICE_URL: ${DASHBOARD_SERVICE_URL:-http://localhost:3002}
        SETTINGS_SERVICE_URL: ${SETTINGS_SERVICE_URL:-http://localhost:3003}
    container_name: micro-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - user-service
      - dashboard-service
      - settings-service

volumes:
  pg_data:
